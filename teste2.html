<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste de Fogo: Custom Hook useFetch</title>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .product-item {
        padding: 10px;
        border-bottom: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // ============================================
      // 1. CUSTOM HOOK: Encapsulamento de Lógica Assíncrona
      // ============================================
      // [PORQUÊ] Hook customizado encapsula requisição HTTP para reutilização.
      // Permite que múltiplos componentes compartilhem a MESMA lógica sem duplicação.
      // [CONCEITO] DRY (Don't Repeat Yourself) via Hook composition.
      // [PONTO CEGO] Iniciantes acham que hooks são "apenas funções".
      // Não! Hooks têm semântica especial ("regras de hooks") - respeite ordem + context.

      function useFetch(url) {
        // [PORQUÊ] useState([]) para array vazio (não undefined ou null).
        // .map() precisa iterar: [] funciona (0 iterações), undefined quebraria.
        // [CONCEITO] Valor inicial deve ser do tipo esperado (array, not null).
        // [PONTO CEGO] Se useEffect demora, `data` fica vazio enquanto loading=true.
        // Iniciantes confundem: "array vazio = dados carregados?". Não! Vazio ANTES deles.
        const [data, setData] = useState([]);

        // [PORQUÊ] loading é flag que controla renderização condicional (mostra spinner).
        // [CONCEITO] Estado 3-fases: loading=true → loading=false + data populado.
        const [loading, setLoading] = useState(true);

        // [PORQUÊ] useEffect com [url] dependency.
        // Se omitisse [url], effect rodaria 1x no mount (URL antiga), nunca atualizaria!
        // [PONTO CEGO] CLOSURE STALE: useEffect captura `url` via closure.
        // Sem [url], closure fica preso à URL original. Se componente receber URL nova,
        // effect NÃO reroda → dados antigos exibidos. BUG CRÍTICO e SUTIL!
        // [CONCEITO] Dependency array = instrução "quando reexecutar este effect".
        // Omitir = bug; [] vazio = mount only; [url] = toda mudança de URL.
        useEffect(() => {
          console.log(`Buscando dados da URL: ${url}`);

          // [PORQUÊ] fetch() nativo (sem axios).
          // Reduz dependências. Ambos retornam Promise (mesma interface).
          // [CONCEITO] Promise chaining vs async/await: ambos lidam com assincronicidade.
          // Promise.then() é imperativo. async/await é mais legível (mas requer try/catch).

          fetch(url)
            .then((resposta) => resposta.json())
            // [PONTO CEGO] ERRO SILENCIOSO: sem .catch(), parsing error não é tratado!
            // Se JSON for inválido, chain quebra sem notificação visual.
            // [MELHOR] Adicionar .catch((err) => console.error(err)) para debugging.
            .then((dados) => {
              // [PORQUÊ] setData cria NOVA referência do array.
              // Comparação (old !== new) dispara Reconciliação do React.
              // [CONCEITO] Imutabilidade: React depende de referential equality para detectar mudanças.
              // Se mutássemos array original, novo === velho (mesmo reference) → React ignora!
              setData(dados);

              // [PORQUÊ] setLoading(false) DEPOIS de setData.
              // Se revertesse ordem, componente renderizaria "loading=false + dados=[]" (UI quebrada).
              // [PONTO CEGO] Iniciantes confundem: "setState é assíncrono, ordem não importa".
              // ERRADO! Ordem importa porque setState é enfileirado (batching).
              // React executa effects na ordem: setData → setLoading → render.
              setLoading(false);
            });
          // [PONTO CEGO] MEMORY LEAK: Sem cleanup, se componente desmontar MID-FETCH,
          // setData/setLoading rodará em componente "fantasma" (unmounted).
          // React avisar: "Can't perform a React state update on an unmounted component".
          // [CONCEITO] Cleanup = função que roda ao desmontar ou antes de effect reroder.
          // Aqui seria: return () => { abortController.abort() } para cancelar requisição.
          // Esse código OMITE cleanup = BUG POTENCIAL (aqui ignorado para simplicidade).
        }, [url]); // [CONCEITO] Dependency array = "reexecute quando url mudar".

        // [PORQUÊ] Retornar objeto {data, loading} em vez de array.
        // Objeto permite destruturação nomeada: const {data, loading} = useFetch(...).
        // Array seria: const [data, loading] = useFetch(...).
        // Ambos funcionam. Objeto é mais semântico (labels claros).
        // [CONCEITO] Objeto vs Array: clareza vs compacidade.
        return { data, loading };
      }

      // ============================================
      // 2. COMPONENTE: Interface Visual baseada em Estado
      // ============================================
      // [PORQUÊ] ProductList separado do Hook useFetch.
      // [CONCEITO] Separation of Concerns: Hook = lógica, Componente = UI.
      // Isso permite testar lógica isoladamente e reutilizar o hook em múltiplos componentes.
      // [PONTO CEGO] Iniciantes misturam: "tudo em um componente".
      // Resultado: componentes gordos, difíceis de testar e reutilizar.

      function ProductList() {
        // [PORQUÊ] Renaming via destructuring: const {data: products, loading}.
        // Hook retorna generic "data". Aqui renomeamos para "products" para clareza.
        // [CONCEITO] Aliasing: não cria cópia, é apenas referência local.
        // Melhora legibilidade sem custo de performance.
        // [PONTO CEGO] Iniciantes confundem: "está copiando?" NÃO! Apenas renomeando.

        // Hook customizado em ação. Este CALL ao Hook lê o estado do closure do hook.
        // [CONCEITO] Each instance de ProductList tem seu próprio closure do Hook
        // (um por ProductList instância, não global).
        const { data: products, loading } = useFetch(
          "https://fakestoreapi.com/products",
        );

        // [PORQUÊ] Renderização condicional IF loading.
        // Estado em 3 fases: loading=true → false + dados populados.
        // Renderizar <ul> vazia durante loading é bad UX (sem feedback).
        // [CONCEITO] Conditional rendering é parte da lógica React (não só HTML estático).
        // [PONTO CEGO] Se API trava? Tela fica "Carregando..." para sempre!
        // [MELHOR] Adicionar timeout + error state para robustez.

        if (loading) {
          // [PORQUÊ] Mensagem enquanto loading=true.
          // UX feedback: "algo está acontecendo, aguarde".
          return <h3>Carregando os produtos, aguarde...</h3>;
        }

        // [PORQUÊ] .map() transforma array de objetos em array de React Elements.
        // React precisa de lista de elementos para renderizar múltiplos <li>.
        // [CONCEITO] Cada .map() call cria novo React Element por item.
        // [PONTO CEGO] Iniciantes acham que map() é "só loop". NÃO!
        // Em React, map() é transformação (imperativa em terms de JS, declarativa em React).

        return (
          <div>
            <h2>Catálogo de Produtos</h2>
            <ul>
              {products.map((product) => (
                // [PONTO CEGO CRÍTICO] key={product.id} vs key={index}.
                // ❌ ERRADO: key={index} causa bugs se lista reordena!
                // Index é instável: se item 0 for removido, antigo item 1 vira index 0.
                // React perde identidade do elemento → aplica estado ao item errado.
                // ✅ CORRETO: key={product.id} porque ID é imutável.
                // [CONCEITO] Key = identidade do elemento para Reconciliação.
                // Sem key correta = React diffing quebrado.
                // [PORQUÊ] key é prop RESERVADA (não passa para <li>).
                // React usa internamente para Virtual DOM matching, nada mais.

                <li key={product.id} className="product-item">
                  {/* [PORQUÊ] Template literal em JSX ({}).
                      Mais legível que concatenação: "string" + var + " - " + var.
                      [CONCEITO] JSX suporta interpolação via {} (não template strings).
                      [{PONTO CEGO] Iniciantes confundem JSX com template strings (backticks).
                      Backticks aqui não funcionam (estamos dentro de JSX). */}
                  <strong>{product.title}</strong> - R$ {product.price}
                </li>
              ))}
            </ul>
          </div>
        );
      }

      // ============================================
      // 3. RENDER: Montando a Árvore React no DOM
      // ============================================
      // [PORQUÊ] createRoot() vs ReactDOM.render() antigo.
      // React 18+ permite Concurrent Features (priorizar updates críticos).
      // ReactDOM.render() (v17) era síncrono (bloqueava thread).
      // [CONCEITO] Root = ponto de entrada onde React assume controle do DOM.
      // Tudo dentro = Virtual DOM, state management, Reconciliação.
      // [PONTO CEGO] Modificar HTML do root direto quebra sincronização com React.
      // O root é propriedade do React, não sua para mexer!

      const root = ReactDOM.createRoot(document.getElementById("root"));

      // [PORQUÊ] <ProductList /> (JSX) vs ProductList (função).
      // <ProductList /> transpila para React.createElement(ProductList, null);
      // React precisa de React Element object, não da função bruta.
      // [CONCEITO] JSX = syntactic sugar para React.createElement().
      root.render(<ProductList />);
    </script>
  </body>
</html>
