<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik&display=swap"
      rel="stylesheet"
    />

    <title>Rocketseat - React.js - Fundamentos</title>

    <style type="text/tailwindcss">
      @theme {
        /* Cor padrão do texto em todo o app. */
        --text: #ebebeb;
        /* Cor usada para textos secundários, menos contrastantes. */
        --text-secondary: #6b6b6b;
        /* Cor primária para destaques e botões principais. */
        --primary: #462878;
        /* Cor de fundo dos cards e componentes principais. */
        --background: #2d2a37;

        /* Gradiente usado como background principal dos botões. */
        --gradient:
          180deg, rgba(0, 0, 0, 0.05) 0%, rgba(255, 255, 255, 0.05) 100%;

        /* Gradiente usado no estado hover dos botões. */
        --gradient-hover:
          180deg, rgba(0, 0, 0, 0.1) 0%, rgba(255, 255, 255, 0.1) 100%;

        /* Sombra composta usada em cards e botões para profundidade. */
        --shadow:
          0px 11px 7px 0px rgba(0, 0, 0, 0.01),
          0px 7px 7px 0px rgba(0, 0, 0, 0.04),
          0px 4px 6px 0px rgba(0, 0, 0, 0.1),
          0px 2px 4px 0px rgba(0, 0, 0, 0.26),
          0px 0px 2px 0px rgba(0, 0, 0, 0.29),
          0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;

        --font-sans: "Rubik", sans-serif;
      }
    </style>
  </head>

  <body
    class="bg-linear-[180deg,_#807ECE_0%,_#807ECE_100%] min-h-screen text-(--text) font-(--font-sans)"
  >
    <!--
    Root do React.
    O aplicativo de calculadora será renderizado dentro deste elemento.
  -->
    <div id="root"></div>

    <!-- Dependências (Tailwind, React, ReactDOM e Babel para JSX em navegador) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      /*.s
      Este arquivo HTML contém uma aplicação completa de calculadora construída com React.
      React é uma biblioteca JavaScript para criar interfaces de usuário interativas.
      Aqui, usamos JSX (uma extensão do JavaScript) para escrever código que parece HTML dentro do JS.

      Analogia: Pense na calculadora como uma máquina com botões. Cada botão pressiona uma tecla,
      e a máquina calcula e mostra o resultado. No código, os "botões" são elementos na tela que,
      quando clicados, chamam funções que atualizam o que é mostrado.

      O código é dividido em:
      - Componentes reutilizáveis (Text, Button, Card): Como blocos de Lego para construir a UI.
      - Estado e lógica: Variáveis que guardam o que o usuário digitou e o resultado.
      - Contexto: Uma forma de compartilhar dados (histórico) entre partes da app.
      - Renderização: Como o React transforma o código em elementos visíveis no navegador.

      Vamos explicar passo a passo adicionando comentários detalhados em cada parte.
      */

      // Este script é executado no navegador e transpilado pelo Babel em tempo real.
      // Ele permite usar JSX e sintaxe moderna do JavaScript sem um passo de build.
      // Em uma aplicação real, esse passo normalmente seria feito em build para
      // evitar o custo de transpilar no cliente.
      // -------------------------------------------------------------------------
      // Componentes básicos de UI (Text, Button, Card) e estilos reutilizáveis
      // -------------------------------------------------------------------------

      /*
      textVariants: Um objeto que define estilos diferentes para texto.
      É como um catálogo de roupas: "default" para roupa casual, "heading" para formal, etc.
      Cada variante é uma string com classes CSS do Tailwind.
      */
      const textVariants = {
        // Estilo padrão usado na maioria dos textos.
        default: "text-xl",
        // Estilo secundário (menos destaque) usando a cor definida em --text-secondary.
        muted: "text-xl text-(--text-secondary)",
        // Estilo usado para títulos, maior que o padrão.
        heading: "text-2xl",
        // Estilo usado para destaques principais (maior que headings comuns).
        blast: "text-3xl",
      };

      /*
      Função Text: Um componente React reutilizável para exibir texto.
      Recebe props (propriedades) como argumentos, como o tipo de elemento HTML a criar,
      a variante de estilo, classes extras, e o conteúdo (children).

      Analogia: É como um molde para fazer placas de sinalização. Você diz qual forma (span, div),
      qual cor/tamanho (variant), e o que escrever (children).
      */
      function Text({
        // Define qual elemento HTML será criado (span, div, button, etc.)
        as = "span",
        // Variante de estilo (padrão, mutado, título, destaque)
        variant = "default",
        // Classes adicionais passadas pelo usuário (para customização local).
        className,
        // Conteúdo interno deste componente (texto, elementos JSX, etc.).
        children,
        // Recebe qualquer outra propriedade válida de um elemento HTML.
        ...props
      }) {
        // React.createElement é usado aqui em vez de JSX para mostrar que
        // este componente é gerado dinamicamente com a tag definida em `as`.
        return React.createElement(
          as,
          {
            // Concatena classe do tema com classes extras passadas pelo consumidor.
            className: `${textVariants[variant]} ${className ? className : ""}`,
            ...props,
          },
          children,
        );
      }

      /*
      buttonVariants: Define estilos de fundo para botões.
      Semelhante ao textVariants, mas para cores de fundo.
      */
      // Define as variações de cor de fundo para os botões.
      // Usamos variáveis CSS definidas no tema (`--background`, `--primary`).
      const buttonVariants = {
        // Botão padrão com cor de fundo igual ao background principal.
        default: "bg-(--background)",
        // Botão de ação primária (operações matemáticas, por exemplo).
        primary: "bg-(--primary)",
      };

      /*
      Função Button: Componente para botões clicáveis.
      Reutiliza o componente Text para consistência de estilo, mas adiciona propriedades de botão.
      */
      // Botão estilizado que reutiliza o componente Text para aplicar
      // as mesmas regras de tipografia e permitir passagem de props.
      function Button({ variant = "default", className, children, ...props }) {
        return (
          <Text
            as="button" // Renderiza um elemento <button> real.
            variant="heading" // Usa o estilo de texto heading para deixá-lo legível.
            className={`            flex items-center justify-center rounded-xl
            p-3 cursor-pointer text-(--text) 
            bg-linear-(--gradient) 
            hover:bg-linear-(--gradient-hover)
            shadow-(--shadow)
            ${buttonVariants[variant]} // Aplica cor de fundo conforme a variante escolhida.
            ${className ? className : ""} // Permite customizar com classes extras.
          `}
            {...props} // Prop forwarding para `onClick`, `type`, etc.
          >
            {children} {/* Texto ou elementos filhos do botão. */}
          </Text>
        );
      }

      /*
      Função Card: Um container estilizado para agrupar elementos.
      Como uma caixa bonita para colocar coisas dentro.
      */
      // Card genérico usado como container para separar visualmente seções.
      function Card({ children, className, ...props }) {
        return (
          <div
            className={`            bg-(--background) shadow-(--shadow)
            rounded-2xl
            ${className ? className : ""} // Permite adicionar classes extras via prop.
          `}
            {...props}
          >
            {children}
          </div>
        );
      }

      /*
      buttons: Uma matriz (array de arrays) que define o layout dos botões da calculadora.
      Cada sub-array é uma linha de botões. Cada botão é um objeto com propriedades como
      input (o que o botão representa), variant (estilo), className (tamanho personalizado).

      Analogia: É como um mapa de assentos em um teatro. Cada linha tem assentos com características diferentes.
      */
      // Estrutura que representa a grade de botões da calculadora.
      // Cada sub-array representa uma linha de botões.
      const buttons = [
        [
          { input: "CE" },
          { input: "C", className: "flex-1 h-16" },
          { input: "/", variant: "primary" },
        ],
        [
          { input: "7" },
          { input: "8" },
          { input: "9" },
          { input: "*", variant: "primary" },
        ],
        [
          { input: "4" },
          { input: "5" },
          { input: "6" },
          { input: "-", variant: "primary" },
        ],
        [
          { input: "1" },
          { input: "2" },
          { input: "3" },
          { input: "+", variant: "primary" },
        ],
        [
          { input: "0", className: "flex-1 h-16" },
          { input: "," },
          { input: "=", className: "w-16 h-16 bg-[#7f45e2]" },
        ],
      ];

      /*
      Contexto em React: Uma forma de compartilhar dados entre componentes sem passar props manualmente.
      Aqui, compartilhamos o histórico de operações entre a calculadora e o componente de histórico.

      Analogia: Como um quadro de avisos na escola. Qualquer aluno pode ler ou escrever nele,
      e todos veem as mudanças.
      */
      // Contexto para compartilhar histórico de operações entre componentes
      // O valor do contexto é fornecido pelo provider e consumido por hooks.
      const CalculatorContext = React.createContext();

      /*
      CalculatorProvider: Um componente que fornece o contexto para seus filhos.
      Gerencia o estado do histórico e o salva/carrega do localStorage (memória do navegador).

      Analogia: O professor que mantém o quadro de avisos atualizado.
      */
      function CalculatorProvider({ children }) {
        // Histórico de operações (persistido no localStorage).
        // `history` é um array de strings no formato "expressão=resultado".
        const [history, setHistory] = React.useState([]);
        // Chave usada para armazenar e recuperar o histórico no localStorage.
        const historyStorageKey = "history";

        /*
        updateHistory: Função para adicionar uma nova operação ao histórico.
        Salva tanto na memória (estado) quanto no localStorage para persistência.
        */
        // Atualiza o histórico na memória e no localStorage.
        // Usa a forma de callback de setState para evitar problemas com closures.
        function updateHistory(operation, parsedResult) {
          setHistory((prev) => {
            // Cria um novo array (imutável) para que o React detecte a mudança.
            const updatedHistory = [...prev, `${operation}=${parsedResult}`];

            // Persiste o histórico como JSON no localStorage.
            localStorage.setItem(
              historyStorageKey,
              JSON.stringify(updatedHistory),
            );

            // Atualiza o estado com o novo histórico.
            return updatedHistory;
          });
        }

        /*
        useEffect: Hook do React que executa código quando o componente monta.
        Aqui, carrega o histórico salvo no localStorage.
        */
        // Quando o Provider é montado, carrega o histórico armazenado no localStorage.
        // O array de dependências vazio ([]) garante que isso execute apenas uma vez.
        React.useEffect(() => {
          const savedHistory = localStorage.getItem(
            historyStorageKey,
            JSON.stringify(history),
          );

          // Se não houver histórico, usamos um array vazio.
          setHistory(JSON.parse(savedHistory || "[]"));
        }, []);

        return (
          <CalculatorContext.Provider value={{ history, updateHistory }}>
            {children}
          </CalculatorContext.Provider>
        );
      }

      /*
      useCalculator: Um hook personalizado do React que encapsula a lógica da calculadora.
      Hooks são funções que permitem usar estado e efeitos em componentes funcionais.

      Analogia: É como o cérebro da calculadora. Recebe entradas (botões pressionados) e decide
      o que fazer: atualizar a operação, calcular resultado, limpar, etc.
      */
      function useCalculator() {
        // Representa a expressão matemática atual composta pelos botões.
        // Exemplo: "12+34".
        const [operation, setOperation] = React.useState("");

        // Valor exibido como resultado da operação.
        // Exemplo: "46".
        const [result, setResult] = React.useState("");

        // Recupera a função para atualizar o histórico a partir do contexto.
        const { updateHistory } = React.useContext(CalculatorContext);

        /*
        doOperation: A função principal que processa cada entrada do usuário.
        Decide o que fazer baseado no input: limpar, calcular, adicionar dígito, etc.
        */
        function doOperation(input) {
          // Mesmo que o usuário veja apenas texto, internamente tratamos tudo como string.
          // Os botões entregam valores como "1", "2", "+", "=", "C", "CE", ",".

          // A ordem das verificações abaixo importa porque alguns comandos têm
          // prioridade absoluta (como limpar ou calcular), enquanto outros apenas
          // concatenam caracteres na expressão.

          // ================================================================
          // Comandos especiais (limpar / apagar / calcular)
          // ================================================================

          /*
          "C": Limpa tudo. Como apertar o botão de reset na calculadora.
          */
          // "C": limpa completamente o estado atual da calculadora.
          // Usado quando o usuário quer começar do zero.
          if (input === "C") {
            setOperation("");
            setResult("");
            return;
          }

          /*
          "CE": Apaga o último caractere. Como backspace.
          */
          // "CE": apaga apenas o último caractere da operação atual.
          // Não afeta o resultado anterior, mas reseta o display do resultado.
          if (input === "CE") {
            setResult("");
            setOperation(operation.slice(0, -1));
            return;
          }

          /*
          "=": Calcula a expressão usando eval() (função JavaScript que executa código).
          Converte vírgulas para pontos (formato internacional), calcula, converte de volta.
          Salva no histórico.
          */
          // "=": avalia a expressão e grava o resultado no histórico.
          // Este comando é processado imediatamente, sem concatenar nada.
          if (input === "=") {
            // A função eval() interpreta números com ponto decimal.
            // Ajustamos a expressão para a notação local antes de avaliar.
            const operationResult = eval(operation.replace(/,/g, "."));

            // Converte novamente para vírgula para exibição local.
            const parsedResult = operationResult
              .toString()
              ?.replace(/\./g, ",");

            setResult(parsedResult);
            updateHistory(operation, parsedResult);

            return;
          }

          // ================================================================
          // Lógica de continuação após já ter um resultado calculado
          // ================================================================

          /*
          Se já temos um resultado (usuário pressionou =), o próximo input decide:
          - Número: começa nova operação com esse número.
          - Operador: continua usando o resultado atual + operador.
          */
          // Se `result` não estiver vazio, significa que o usuário acabou de
          // pressionar "=" e viu um resultado. Neste caso, temos duas opções:
          // 1) Se o próximo input for número => iniciar uma nova operação.
          // 2) Se for operador => continuar a operação usando o resultado atual.
          if (result) {
            // `isNaN(input)` serve para diferenciar operadores (que não são números)
            // de dígitos (que podem ser convertidos para número).
            setOperation(isNaN(input) ? `${result}${input}` : input);
            setResult("");
            return;
          }

          // ================================================================
          // Regras de formatação da expressão em progresso
          // ================================================================

          /*
          "," (vírgula): Só permite uma vírgula consecutiva para evitar "1,,2".
          */
          // Permite apenas uma vírgula consecutiva (não deixa o usuário digitar "1,,2").
          if (input === "," && !operation.endsWith(",")) {
            setOperation(`${operation},`);
            return;
          }

          /*
          Caso geral: Adiciona o input ao final da operação atual.
          Como digitar em um campo de texto.
          */
          // Caso geral: concatena o input ao final da expressão atual.
          setOperation(`${operation}${input}`);
        }
        // Retorna um objeto com o estado atual e a função para processar inputs.
        // Outros componentes podem usar isso para controlar a calculadora.        // Expondo o estado e a função de operação para componentes consumidores.
        return {
          operation,
          result,
          doOperation,
        };
      }

      /*
      CalculatorDisplay: Componente que mostra a tela da calculadora.
      Exibe a operação atual e o resultado, se houver.

      Analogia: A tela LCD da calculadora onde você vê os números e operações.
      */
      // Componente responsável por exibir a operação atual e o resultado.
      function CalculatorDisplay({ operation, result }) {
        // `operation` é a expressão digitada (ex: "1+2").
        // `result` é o valor calculado (ex: "3").
        return (
          <div
            className={`
              flex flex-col gap-2 px-[1.375rem]
              cursor-default select-none
            `}
          >
            {/* Linha superior: mostra a operação apenas se há resultado */}
            <Text
              as="div"
              variant="muted"
              className="flex items-center justify-end h-7"
            >
              {/*
                Mostra a operação anterior somente quando já existe um resultado.
                Ex: ao calcular 1+2, mostramos "1+2" acima do resultado "3".
              */}
              {result && operation}
            </Text>
            {/* Linha inferior: símbolo = e o resultado ou operação atual */}
            <div
              className={`
              flex items-center justify-between h-9
              `}
            >
              {/* Símbolo de igualdade fixo, representa o resultado esperado. */}
              <Text variant="muted">=</Text>

              {/* Mostra resultado se existir, caso contrário exibe a expressão atual. */}
              <Text variant="blast">{result || operation}</Text>
            </div>
          </div>
        );
      }

      /*
      Calculator: O componente principal da calculadora.
      Junta o display e os botões, conectando-os com a lógica do useCalculator.

      Analogia: A calculadora física completa - tela + botões + circuitos internos.
      */
      function Calculator() {
        // Extrai estado e função do hook de cálculo personalizado.
        const { operation, result, doOperation } = useCalculator();

        /*
        handleInputClick: Função que conecta o clique do botão à lógica de cálculo.
        Como um intermediário que traduz "botão clicado" para "processar input".
        */
        // Encaminha o clique de botão para a lógica de cálculo.
        // Aqui isolamos para facilitar testes ou adição de comportamento extra.
        function handleInputClick(input) {
          doOperation(input);
        }

        return (
          <Card
            className={`
          flex flex-col gap-[1.625rem] w-[22.25rem]
          pt-14 px-8 pb-8
          `}
          >
            {/* Componente que mostra operação/resultado */}
            <CalculatorDisplay operation={operation} result={result} />

            {/* Grade de botões: renderiza cada linha e botão da matriz buttons */}
            <div className="flex flex-col gap-3">
              {/* Gera as linhas de botões da calculadora a partir da matriz "buttons". */}
              {buttons.map((row, index) => (
                <div key={`row-${index}`} className="flex gap-3">
                  {row.map((button) => (
                    <Button
                      key={button.input} // Garante chave única para renderização eficiente.
                      className={button.className || "w-16 h-16"} // Default tamanho 4x4.
                      variant={button.variant} // Permite estilos condicionais.
                      onClick={() => handleInputClick(button.input)}
                    >
                      {button.input}
                    </Button>
                  ))}
                </div>
              ))}
            </div>
          </Card>
        );
      }

      /*
      OperationHistory: Componente que mostra o histórico de cálculos realizados.
      Lê o histórico do contexto e exibe como uma lista.

      Analogia: O histórico de chamadas no telefone - mostra operações passadas.
      */
      // Exibe o histórico de operações salvas no contexto.
      // O histórico é mantido no localStorage e atualizado pelo Provider.
      function OperationHistory() {
        // Pega o histórico do contexto compartilhado.
        const { history } = React.useContext(CalculatorContext);

        return (
          <Card className="w-full py-10 px-8">
            {/* Título do histórico */}
            <Text as="h1" variant="heading" className="mb-4">
              Histórico de Operações
            </Text>

            {/* Condicional: mostra lista se há histórico, senão mensagem */}
            {history.length > 0 ? (
              // Se houver histórico, exibe cada item em uma lista.
              <ul className="flex flex-col gap-3">
                {history.map((value, index) => (
                  <Text key={`item-${index}`} as="li">
                    {/* Cada item já vem no formato "expressão=resultado". */}
                    {value}
                  </Text>
                ))}
              </ul>
            ) : (
              // Caso não haja itens no histórico, mostra mensagem amigável.
              <Text as="p" variant="muted">
                Nenhuma operação recente.
              </Text>
            )}
          </Card>
        );
      }

      /*
      App: Componente raiz da aplicação.
      Organiza o layout geral: calculadora + histórico lado a lado.
      Fornece o contexto do histórico para os componentes filhos.

      Analogia: A página principal do site, que organiza todos os elementos.
      */
      // Componente raiz da aplicação que organiza layout e provê contexto.
      function App() {
        return (
          <main
            className={`
          py-28 px-4 sm:px-10
          flex flex-col sm:flex-row
          items-center sm:items-stretch
          gap-2
          `}
          >
            {/* CalculatorProvider envolve os componentes que precisam do histórico */}
            {/* Provider disponibiliza o histórico para toda a árvore abaixo. */}
            <CalculatorProvider>
              <Calculator />
              <OperationHistory />
            </CalculatorProvider>
          </main>
        );
      }

      /*
      ReactDOM.createRoot: Ponto de entrada do React.
      "Monta" o componente App dentro do elemento HTML com id="root".
      É aqui que o código JavaScript se conecta ao HTML da página.

      Analogia: Como ligar a energia - sem isso, a calculadora não funciona.
      */
      // Inicializa o React no elemento <div id="root"> do HTML.
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);

      /*
      FLUXO GERAL DO PROGRAMA:

      1. HTML carrega: define estilos CSS e inclui scripts do React/Babel.
      2. Babel transpila o JSX em JavaScript normal.
      3. ReactDOM.render monta o componente App no <div id="root">.
      4. App renderiza CalculatorProvider, que fornece contexto de histórico.
      5. Calculator usa useCalculator hook para gerenciar estado (operação/resultado).
      6. CalculatorDisplay mostra a operação atual ou resultado.
      7. Botões são renderizados da matriz 'buttons' e chamam doOperation quando clicados.
      8. doOperation processa inputs: limpa, calcula, adiciona dígitos, etc.
      9. Resultados são salvos no histórico via contexto e localStorage.
      10. OperationHistory mostra o histórico salvo.

      Analogia completa: É como uma calculadora real conectada a um caderno.
      Você aperta botões (inputs), vê na tela (display), calcula (lógica), e anota no caderno (histórico).
      Tudo funciona junto para dar uma experiência completa ao usuário.
      */
    </script>
  </body>
</html>
