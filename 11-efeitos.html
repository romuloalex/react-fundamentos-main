<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentos</title>
  </head>

  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function Counter() {
        const [counter, setCounter] = React.useState(0);
        const [name, setName] = React.useState("");

        // [PORQUÊ] useEffect com [] (array vazio) roda UMA VEZ após montagem do componente.
        // Útil para inicializar dados (fetch API), subscribers, timers que não mudam.
        // [CONCEITO] Ciclo de vida: mount -> effect -> unmount (return cleanup).
        // [PONTO CEGO] Iniciantes acham que a função roda AO RENDERIZAR a UI. Não!
        // Roda APÓS React pintar o DOM. Ordem: render -> commit -> effect.
        React.useEffect(() => {
          console.log("Componente montado!");

          // [PORQUÊ] return é a função de limpeza (cleanup): roda ao desmontar.
          // Use para limpar listeners, cancelar requests, limpar timers.
          // [CONCEITO] Cleanup previneDados vazar/memleaks quando componente sai da tela.
          return () => {
            console.log("Componente desmontado!");
          };
        }, []);

        // [PORQUÊ] useEffect com [counter] roda quando counter muda.
        // Sempre que counter é atualizado, esse effect re-executa.
        // [CONCEITO] Dependency array: React compara valor anterior vs novo com ===.
        // [PONTO CEGO] Iniciantes esquecem a dependência: effet roda TODA renderização!
        // Sem [], roda sempre. Com [], uma vez. Com [counter], quando counter muda.
        React.useEffect(() => {
          if (counter > 0) {
            console.log(`Contador atualizado: ${counter}`);
          }
        }, [counter]);

        // [PORQUÊ] useEffect com [counter, name] roda quando QUALQUER um mudar.
        // Útil quando a lógica depende de múltiplas fontes de estado.
        // [CONCEITO] Dependency array = lista de variáveis "assistidas".
        React.useEffect(() => {
          console.log("Contador ou nome atualizados");
        }, [counter, name]);

        return (
          <>
            <div>
              <label>Nome:</label>
              {/* [PORQUÊ] onChange lê e.target.value imediatamente (síncronamente).
                [CONCEITO] Controlled input: value={name} + onChange sincroniza state com DOM.
                [PONTO CEGO] Async/await em onChange? value será antigo! Acesse no callback direto. */}
              <input onChange={(e) => setName(e.target.value)} />
            </div>

            <p>Contador: {counter}</p>
            <button onClick={() => setCounter(10)}>Atualizar</button>
            <button onClick={() => setCounter((prevValue) => prevValue + 1)}>
              Incrementar
            </button>
            <button onClick={() => setCounter((prevValue) => prevValue - 1)}>
              Decrementar
            </button>
          </>
        );
      }

      function App() {
        const [show, setShow] = React.useState(true);

        // [PORQUÊ] Botão controla renderização de Counter (true/false).
        // Quando show = false, Counter é removido da árvore: cleanup effects rodão.
        // Quando show = true, Counter monta novamente: effects sem [] rodarem.
        // [CONCEITO] Conditional rendering + Effect lifecycle: vê o padrão mount -> cleanup ->mount.
        // [PONTO CEGO] Iniciantes acham que Counter "pausa" em false. Não! É destruído e recriado.
        return (
          <main>
            <button onClick={() => setShow((prev) => !prev)}>
              Mostrar/Ocultar Contador
            </button>
            <hr />
            {show && <Counter />}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
